name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-scan:
    name: Static Analysis, Security Scanning and Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Docker build checks
        run: docker build --check .

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Run go formatting (gofmt)
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Static Analysis (go vet)
        run: go vet ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Security Scanner (gosec)
        run: gosec ./...

      - name: Dependency Vulnerable Scanner (govulncheck)
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: 1.26.3
          go-package: ./...

      - name: Unit Tests (go test)
        run: go test -v -race ./...
